<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>渝联达 · 企业演示 PPT · 爱看书的YY</title>
  <meta name="description" content="虚构企业全链路演示文稿，4K 高清 21 页。">
  <link rel="icon" href="assets/haomark.png" type="image/png">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { -webkit-font-smoothing: antialiased; }

    :root {
      --bg: #0a0a0f;
      --bg-2: #12121a;
      --surface: rgba(255,255,255,0.03);
      --text: #f0f0f5;
      --text-soft: #a0a0b0;
      --text-faint: #606070;
      --border: rgba(255,255,255,0.08);
      --border-hover: rgba(255,255,255,0.15);
      --accent: #7c5cfc;
      --accent-glow: rgba(124,92,252,0.4);
      --radius: 16px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 背景光斑 */
    .bg-orbs { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.12;
      animation: orbFloat 20s ease-in-out infinite;
    }
    .orb-1 { width: 500px; height: 500px; background: var(--accent); top: -100px; left: -100px; }
    .orb-2 { width: 400px; height: 400px; background: #00d4ff; bottom: -100px; right: -100px; animation-delay: -5s; }
    @keyframes orbFloat {
      0%,100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(40px,-30px) scale(1.1); }
    }

    /* 导航 */
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(10,10,15,0.8);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border-bottom: 1px solid var(--border);
    }
    .nav-inner {
      max-width: 1000px; margin: 0 auto;
      padding: 16px 24px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .nav-back {
      color: var(--text-soft); text-decoration: none; font-size: 14px;
      display: inline-flex; align-items: center; gap: 6px;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--text); }
    .nav-title { font-size: 14px; font-weight: 600; color: var(--text-soft); }

    .content { position: relative; z-index: 2; flex: 1; display: flex; flex-direction: column; }

    /* 标题区 */
    .header {
      max-width: 1000px; margin: 0 auto;
      padding: 60px 24px 40px; text-align: center;
    }
    .header h1 {
      font-size: clamp(28px, 5vw, 42px); font-weight: 700;
      letter-spacing: -0.03em; margin-bottom: 12px;
      background: linear-gradient(135deg, #fff 0%, #888 100%);
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p { color: var(--text-soft); font-size: 16px; }
    .header .tags {
      display: flex; gap: 8px; justify-content: center; margin-top: 16px; flex-wrap: wrap;
    }
    .header .tag {
      font-size: 12px; color: var(--text-faint);
      padding: 4px 12px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 100px;
    }

    /* ===== PPT 查看器 ===== */
    .viewer {
      flex: 1;
      display: flex; flex-direction: column; align-items: center;
      padding: 20px 24px 40px;
      max-width: 1200px; margin: 0 auto; width: 100%;
    }

    .slide-container {
      position: relative;
      width: 100%;
      max-width: 960px;
      aspect-ratio: 16/9;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 40px rgba(124,92,252,0.06);
      background: #000;
    }

    .slide {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: contain;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .slide.active { opacity: 1; }

    /* 翻页按钮 */
    .nav-btn {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 44px; height: 44px; border-radius: 50%;
      background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      color: var(--text); font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; z-index: 10;
    }
    .nav-btn:hover {
      background: rgba(124,92,252,0.3); border-color: var(--accent);
      box-shadow: 0 0 20px var(--accent-glow);
    }
    .nav-btn:disabled {
      opacity: 0.2; cursor: not-allowed;
    }
    .nav-btn:disabled:hover {
      background: rgba(0,0,0,0.6); border-color: var(--border); box-shadow: none;
    }
    .nav-prev { left: 12px; }
    .nav-next { right: 12px; }

    /* 控制栏 */
    .controls {
      display: flex; align-items: center; justify-content: center;
      gap: 20px; margin-top: 24px; flex-wrap: wrap;
    }
    .page-info {
      font-size: 14px; color: var(--text-soft);
      font-variant-numeric: tabular-nums;
      min-width: 80px; text-align: center;
    }
    .page-info .current { color: var(--text); font-weight: 600; }

    /* 缩略图条 */
    .thumbs {
      display: flex; gap: 8px;
      overflow-x: auto; padding: 20px 24px;
      max-width: 100%; scroll-behavior: smooth;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }
    .thumbs::-webkit-scrollbar { height: 4px; }
    .thumbs::-webkit-scrollbar-track { background: transparent; }
    .thumbs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .thumb {
      flex-shrink: 0;
      width: 80px; aspect-ratio: 16/9;
      border-radius: 6px; overflow: hidden;
      border: 2px solid transparent;
      cursor: pointer; opacity: 0.4;
      transition: all 0.2s;
    }
    .thumb:hover { opacity: 0.7; }
    .thumb.active {
      opacity: 1; border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .thumb img { width: 100%; height: 100%; object-fit: cover; }

    /* 底部 */
    .footer-bar {
      padding: 40px 24px; text-align: center;
      border-top: 1px solid var(--border);
      max-width: 1000px; margin: 0 auto; width: 100%;
    }
    .footer-bar a {
      color: var(--text-soft); text-decoration: none; font-size: 14px;
      transition: color 0.2s;
    }
    .footer-bar a:hover { color: var(--text); }

    /* ===== 海报展示区 ===== */
    .posters {
      max-width: 1000px; margin: 0 auto;
      padding: 20px 24px 60px; width: 100%;
    }
    .posters-title {
      font-size: 13px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.15em; color: var(--text-faint);
      margin-bottom: 30px;
      display: flex; align-items: center; gap: 12px;
    }
    .posters-title::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, var(--border) 0%, transparent 100%);
    }
    .posters-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .poster-card {
      border-radius: 12px; overflow: hidden;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s;
      cursor: pointer;
    }
    .poster-card:hover {
      transform: translateY(-4px);
      border-color: var(--border-hover);
      box-shadow: 0 16px 40px rgba(0,0,0,0.3);
    }
    .poster-card img {
      width: 100%; display: block;
      transition: transform 0.4s;
    }
    .poster-card:hover img { transform: scale(1.03); }
    .poster-card .poster-label {
      padding: 12px 16px;
      font-size: 13px; color: var(--text-soft);
      border-top: 1px solid var(--border);
    }

    /* 海报灯箱 */
    .lightbox {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(0,0,0,0.92);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      padding: 40px;
      opacity: 0; visibility: hidden;
      transition: opacity 0.3s, visibility 0.3s;
    }
    .lightbox.open { opacity: 1; visibility: visible; }
    .lightbox img {
      max-width: 100%; max-height: 90vh;
      border-radius: 8px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      transform: scale(0.95);
      transition: transform 0.3s;
    }
    .lightbox.open img { transform: scale(1); }
    .lightbox-close {
      position: absolute; top: 20px; right: 24px;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.1); border: 1px solid var(--border);
      color: var(--text); font-size: 20px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.2); }

    @media (max-width: 768px) {
      .posters-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 600px) {
      .slide-container { max-width: 100%; }
      .nav-btn { width: 36px; height: 36px; font-size: 16px; }
      .thumb { width: 60px; }
      .header { padding: 40px 20px 30px; }
    }
  </style>
</head>
<body>

<!-- 背景光斑 -->
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
</div>

<!-- 导航 -->
<nav>
  <div class="nav-inner">
    <a href="index.html" class="nav-back">← 爱看书的YY</a>
    <span class="nav-title">渝联达 · 企业演示 PPT</span>
  </div>
</nav>

<div class="content">

  <!-- 标题 -->
  <div class="header">
    <h1>渝联达 · 企业演示 PPT</h1>
    <p>企业全链路演示文稿，4K 高清 21 页</p>
    <div class="tags">
      <span class="tag">PPT 设计</span>
      <span class="tag">21 页</span>
      <span class="tag">4K · 3840×2160</span>
    </div>
  </div>

  <!-- PPT 翻页查看器 -->
  <div class="viewer">
    <div class="slide-container" id="slideContainer">
      <!-- slides 由 JS 注入 -->
      <button class="nav-btn nav-prev" id="prevBtn" onclick="changeSlide(-1)">‹</button>
      <button class="nav-btn nav-next" id="nextBtn" onclick="changeSlide(1)">›</button>
    </div>

    <div class="controls">
      <button class="nav-btn" style="position:static;" onclick="changeSlide(-1)" id="prevBtn2">‹ 上一页</button>
      <span class="page-info"><span class="current" id="pageCurrent">1</span> / 21</span>
      <button class="nav-btn" style="position:static;" onclick="changeSlide(1)" id="nextBtn2">下一页 ›</button>
    </div>
  </div>

  <!-- 缩略图条 -->
  <div class="thumbs" id="thumbs"></div>

  <!-- 底部 -->
  <div class="footer-bar">
    <a href="index.html">← 返回作品集</a>
  </div>

</div>

<script>
  const TOTAL = 21;
  const PREFIX = 'assets/yulianda/yulianda_';
  let current = 0;

  // 生成 slides
  const container = document.getElementById('slideContainer');
  const thumbsEl = document.getElementById('thumbs');

  for (let i = 1; i <= TOTAL; i++) {
    const num = String(i).padStart(2, '0');
    const src = PREFIX + num + '.png';

    // slide
    const img = document.createElement('img');
    img.className = 'slide' + (i === 1 ? ' active' : '');
    img.src = src;
    img.alt = '渝联达 PPT 第 ' + i + ' 页';
    img.dataset.index = i - 1;
    container.insertBefore(img, document.getElementById('prevBtn'));

    // thumb
    const thumb = document.createElement('div');
    thumb.className = 'thumb' + (i === 1 ? ' active' : '');
    thumb.dataset.index = i - 1;
    thumb.onclick = () => goToSlide(i - 1);
    const thumbImg = document.createElement('img');
    thumbImg.src = src;
    thumbImg.alt = '';
    thumbImg.loading = 'lazy';
    thumb.appendChild(thumbImg);
    thumbsEl.appendChild(thumb);
  }

  function goToSlide(index) {
    if (index < 0 || index >= TOTAL) return;
    current = index;

    // 切换 slide
    document.querySelectorAll('.slide').forEach((s, i) => {
      s.classList.toggle('active', i === index);
    });

    // 切换缩略图
    document.querySelectorAll('.thumb').forEach((t, i) => {
      t.classList.toggle('active', i === index);
    });

    // 更新页码
    document.getElementById('pageCurrent').textContent = index + 1;

    // 按钮状态
    document.getElementById('prevBtn').disabled = index === 0;
    document.getElementById('nextBtn').disabled = index === TOTAL - 1;
    document.getElementById('prevBtn2').disabled = index === 0;
    document.getElementById('nextBtn2').disabled = index === TOTAL - 1;

    // 缩略图滚动到当前位置
    const activeThumb = document.querySelectorAll('.thumb')[index];
    if (activeThumb) {
      activeThumb.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }
  }

  function changeSlide(delta) {
    goToSlide(current + delta);
  }

  // 键盘翻页
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft') changeSlide(-1);
    if (e.key === 'ArrowRight') changeSlide(1);
  });

  // 触屏滑动
  let touchStartX = 0;
  container.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });
  container.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) changeSlide(dx > 0 ? -1 : 1);
  }, { passive: true });

  // 初始化按钮状态
  document.getElementById('prevBtn').disabled = true;
  document.getElementById('prevBtn2').disabled = true;

  // ===== 灯箱 =====
  function openLightbox(src) {
    document.getElementById('lightboxImg').src = src;
    document.getElementById('lightbox').classList.add('open');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('open');
  }
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeLightbox();
  });
</script>
</body>
</html>
